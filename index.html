<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>README Publisher</title>
  <style>
    :root {
      --bg: #f7f7f9;
      --card: #ffffff;
      --text: #1b1f23;
      --muted: #5b6470;
      --border: #d8dee4;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      color: var(--text);
      background:
        radial-gradient(circle at 0% 0%, #f1f4ff 0%, transparent 35%),
        radial-gradient(circle at 100% 100%, #fff6ea 0%, transparent 35%),
        var(--bg);
      min-height: 100vh;
      display: grid;
      place-items: start center;
      padding: 2rem 1rem;
    }

    main {
      width: min(860px, 100%);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.06);
      overflow: hidden;
    }

    header {
      border-bottom: 1px solid var(--border);
      padding: 1rem 1.25rem;
      color: var(--muted);
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      font-size: 0.95rem;
    }

    #content {
      margin: 0;
      padding: 1.25rem;
      overflow-x: auto;
      white-space: pre-wrap;
      line-height: 1.6;
      font-size: 1rem;
    }

    .error {
      color: #b42318;
      background: #fff2f0;
      border: 1px solid #ffd4cc;
      border-radius: 8px;
      margin: 1rem 1.25rem;
      padding: 0.75rem 0.9rem;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
    }
  </style>
</head>
<body>
  <main>
    <header>Published directly from <code>README.md</code></header>
    <pre id="content">Loading README...</pre>
    <p id="error" class="error" hidden></p>
  </main>

  <script>
    async function loadReadme() {
      const content = document.getElementById("content");
      const error = document.getElementById("error");

      try {
        const response = await fetch("./README.md", { cache: "no-store" });

        if (!response.ok) {
          throw new Error("HTTP " + response.status);
        }

        const text = await response.text();
        content.textContent = text;
      } catch (err) {
        content.textContent = "";
        error.hidden = false;
        error.textContent =
          "Could not load README.md. Run this page from a local server (not file://). Error: " +
          err.message;
      }
    }

    loadReadme();
  </script>
</body>
</html>
