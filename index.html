<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>README Publisher</title>
  <style>
    :root {
      --bg: #f7f7f9;
      --card: #ffffff;
      --text: #1b1f23;
      --muted: #5b6470;
      --border: #d8dee4;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 0% 0%, #f1f4ff 0%, transparent 35%),
        radial-gradient(circle at 100% 100%, #fff6ea 0%, transparent 35%),
        var(--bg);
      min-height: 100vh;
      display: grid;
      place-items: start center;
      padding: 2rem 1rem;
    }

    main {
      width: min(860px, 100%);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.06);
      overflow: hidden;
    }

    header {
      border-bottom: 1px solid var(--border);
      padding: 1rem 1.25rem;
      color: var(--muted);
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      font-size: 0.95rem;
    }

    #content {
      padding: 1.25rem;
      overflow-x: auto;
      line-height: 1.6;
      font-size: 1rem;
    }

    /* Markdown rendered content styles */
    #content h1 {
      font-size: 2em;
      margin: 0.67em 0;
      font-weight: 600;
    }

    #content h2 {
      font-size: 1.5em;
      margin: 0.75em 0;
      font-weight: 600;
      border-bottom: 1px solid var(--border);
      padding-bottom: 0.3em;
    }

    #content h3 {
      font-size: 1.25em;
      margin: 0.83em 0;
      font-weight: 600;
    }

    #content h4 {
      font-size: 1.1em;
      margin: 1em 0;
      font-weight: 600;
    }

    #content h5,
    #content h6 {
      font-size: 1em;
      margin: 1.17em 0;
      font-weight: 600;
    }

    #content p {
      margin: 0.5em 0;
    }

    #content strong,
    #content b {
      font-weight: 600;
      color: var(--text);
    }

    #content em,
    #content i {
      font-style: italic;
    }

    #content code {
      background: #f6f8fa;
      padding: 0.2em 0.4em;
      border-radius: 3px;
      font-family: monospace;
      font-size: 0.9em;
    }

    #content pre {
      background: #f6f8fa;
      padding: 1em;
      border-radius: 6px;
      overflow-x: auto;
      border: 1px solid var(--border);
    }

    #content pre code {
      background: none;
      padding: 0;
      border-radius: 0;
    }

    #content a {
      color: #0969da;
      text-decoration: none;
    }

    #content a:hover {
      text-decoration: underline;
    }

    #content ul,
    #content ol {
      margin: 0.5em 0;
      padding-left: 2em;
    }

    #content li {
      margin: 0.25em 0;
    }

    #content table {
      border-collapse: collapse;
      width: 100%;
      margin: 1em 0;
    }

    #content table th,
    #content table td {
      border: 1px solid var(--border);
      padding: 0.6em 0.8em;
      text-align: left;
    }

    #content table th {
      background: #f6f8fa;
      font-weight: 600;
    }

    #content blockquote {
      border-left: 4px solid var(--border);
      padding-left: 1em;
      margin: 0.5em 0;
      color: var(--muted);
    }

    .error {
      color: #b42318;
      background: #fff2f0;
      border: 1px solid #ffd4cc;
      border-radius: 8px;
      margin: 1rem 1.25rem;
      padding: 0.75rem 0.9rem;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
    }

    .loading {
      color: var(--muted);
      text-align: center;
      padding: 2rem;
    }
  </style>
</head>
<body>
  <main>
    <header>Published directly from <code>README.md</code></header>
    <div id="content" class="loading">Loading README...</div>
    <p id="error" class="error" hidden></p>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    async function loadReadme() {
      const content = document.getElementById("content");
      const error = document.getElementById("error");

      try {
        const response = await fetch("./README.md", { cache: "no-store" });

        if (!response.ok) {
          throw new Error("HTTP " + response.status);
        }

        const text = await response.text();
        content.innerHTML = marked.parse(text);
        content.classList.remove("loading");
      } catch (err) {
        content.textContent = "";
        content.classList.remove("loading");
        error.hidden = false;
        error.textContent =
          "Could not load README.md. Error: " +
          err.message;
      }
    }

    loadReadme();
  </script>
</body>
</html>
